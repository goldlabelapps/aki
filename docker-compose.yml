services:
  # ── Local LLM ────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aki-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Uncomment the block below to enable NVIDIA GPU pass-through:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── AKI app ──────────────────────────────────────────────────────────────────
  aki:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aki-app
    volumes:
      - aki_data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - AKI_DB_PATH=/app/data/aki.db
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  aki_data:
